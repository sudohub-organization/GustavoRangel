<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tag</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        height: 100vh;
        overflow: hidden;
        background: #1a1a2e;
        color: #fff;
      }
      #avatar-container {
        position: relative;
        overflow: hidden;
      }
      #avatar-container canvas {
        display: block;
        width: 100% !important;
        height: 100% !important;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div class="container-fluid h-100">
      <div class="row h-100">
        <!-- Left column: Login form -->
        <div class="col-6 d-flex align-items-center justify-content-center">
          <div class="w-75">
            <h1 class="fw-bold mb-1" style="background: linear-gradient(90deg, #474b86, #505481, #4e517a, #6e708a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">DEMO LOGIN PAGE</h1>
            <p class="mb-4 fst-italic" style="color: #a0a0c0;">with the special participation of <strong style="color:#bd7b17;">TAG</strong> from <strong style="color:#3c84be;">DEV4</strong></p>
            <h2 class="mb-4">Sign In</h2>
            <form>
              <div class="mb-3">
                <label for="email" class="form-label">Email address</label>
                <input type="email" class="form-control" id="email" placeholder="name@example.com" />
              </div>
              <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" placeholder="Password" />
              </div>
              <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>
          </div>
        </div>

        <!-- Right column: 3D Avatar -->
        <div class="col-6 p-0 h-100" id="avatar-container"></div>
      </div>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
