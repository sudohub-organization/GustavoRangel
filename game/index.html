<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gustavo Rangel - Space Portfolio</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- External Libraries -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="smallscreens.css">
</head>
<body class="text-slate-200 game-active">

    <!-- 3D Canvas -->
    <div id="canvas-container"></div>

    <!-- UI Overlay -->
    <div id="ui-layer" class="flex items-center justify-center p-4">
        
        <!-- Custom Cursor Element -->
        <div id="custom-cursor" class="hide-on-mobile"></div>

        <!-- Backdrop to block canvas clicks when modals are open -->
        <div id="modal-backdrop" class="hidden absolute inset-0 bg-slate-900/60 backdrop-blur-sm pointer-events-auto z-40 transition-opacity"></div>

        <!-- Out of Bounds Warning -->
        <div id="warning-msg" class="hidden fixed top-20 left-1/2 transform -translate-x-1/2 text-red-500 text-3xl md:text-5xl font-black text-center z-30 animate-pulse drop-shadow-[0_0_15px_rgba(239,68,68,0.8)] pointer-events-none uppercase tracking-widest">
            Warning <br/> You may get stranded
        </div>

        <!-- Stranded Message -->
        <div id="stranded-msg" class="hidden fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 glass-panel p-8 md:p-12 rounded-2xl text-center z-50 pointer-events-auto border-t-4 border-red-500 shadow-[0_0_50px_rgba(239,68,68,0.3)]">
            <h2 class="text-3xl md:text-5xl font-bold text-red-500 mb-4">SYSTEM FAILURE</h2>
            <p class="text-slate-300 text-lg mb-8">You are stranded in deep space.</p>
            <button onclick="location.reload()" class="bg-red-600 hover:bg-red-500 text-white px-8 py-4 rounded-xl font-bold transition-colors w-full tracking-wider">REBOOT SYSTEM</button>
        </div>

        <!-- Instructions -->
        <div id="instructions" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 glass-panel px-6 py-4 rounded-xl text-sm hide-on-mobile flex items-center gap-6 shadow-[0_0_30px_rgba(244,114,182,0.2)] border-t-2 border-pink-500 pointer-events-auto z-50">
            <div>
                <p><span class="font-bold text-pink-400">WASD</span> or <span class="font-bold text-pink-400">Arrows</span> to move.</p>
                <p>Click objects and portals to explore.</p>
            </div>
            <button onclick="document.getElementById('instructions').style.display='none'" class="text-slate-400 hover:text-white bg-slate-800/50 rounded-full p-2 transition-colors"><i data-lucide="x" class="w-4 h-4"></i></button>
        </div>

        <!-- Project Modal -->
        <div id="modal-project" class="hidden glass-panel w-[90vw] h-[90vh] overflow-y-auto rounded-2xl p-12 shadow-[0_0_50px_rgba(0,0,0,0.5)] border-t-4 border-pink-500 transition-all relative z-50">
            <button onclick="closeModals()" class="absolute top-6 right-6 text-slate-400 hover:text-white bg-slate-800/80 p-2 rounded-full"><i data-lucide="x"></i></button>
            <div class="text-6xl mb-6" id="proj-emoji">🚀</div>
            <h2 id="proj-title" class="text-4xl md:text-5xl font-bold text-white mb-4">Project Title</h2>
            <p id="proj-desc" class="text-slate-300 text-lg mb-8 leading-relaxed max-w-4xl">Description goes here...</p>
            <div id="proj-tools" class="flex flex-wrap gap-2 mb-8"></div>
            <div id="proj-links" class="flex gap-4 flex-wrap"></div>
        </div>

        <!-- Timeline Modal -->
        <div id="modal-timeline" class="hidden glass-panel w-[90vw] h-[90vh] overflow-y-auto rounded-2xl p-12 shadow-[0_0_50px_rgba(34,211,238,0.2)] border-t-4 border-cyan-400 relative z-50">
            <button onclick="closeModals()" class="absolute top-6 right-6 text-slate-400 hover:text-white bg-slate-800/80 p-2 rounded-full"><i data-lucide="x"></i></button>
            <h2 class="text-3xl font-bold text-cyan-400 mb-10 flex items-center gap-3"><i data-lucide="history" class="w-8 h-8"></i> My Timeline</h2>
            <div class="border-l-2 border-slate-700 pl-6 space-y-10" id="timeline-content">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- Character Modal (Gustavo's Info) -->
        <div id="modal-character" class="hidden glass-panel w-[90vw] h-[90vh] overflow-y-auto flex flex-col items-center justify-center rounded-2xl p-8 md:p-16 shadow-[0_0_50px_rgba(168,85,247,0.2)] border-t-4 border-purple-500 text-center relative z-50">
            <button onclick="closeModals()" class="absolute top-6 right-6 text-slate-400 hover:text-white bg-slate-800/80 p-2 rounded-full"><i data-lucide="x"></i></button>
            <div class="w-32 h-32 md:w-40 md:h-40 rounded-full overflow-hidden border-4 border-purple-500 mb-6 shadow-[0_0_30px_rgba(168,85,247,0.3)] mx-auto">
                <img src="public/images/me.jpeg" alt="Gustavo Rangel" class="w-full h-full object-cover bg-slate-800">
            </div>
            <h1 class="text-4xl md:text-6xl font-black text-white mb-4 tracking-tight">I'm Gustavo.</h1>
            <p class="text-slate-300 text-xl font-medium mb-10">Creative Developer & Designer</p>
            
            <div class="flex justify-center gap-4 flex-wrap">
                <a href="https://www.linkedin.com/in/gustavo-rangel-professional/" target="_blank" class="p-4 bg-slate-800 rounded-full hover:bg-purple-600 transition-colors pointer-events-auto border border-slate-700 hover:border-purple-500"><i data-lucide="linkedin" class="w-6 h-6"></i></a>
                <a href="https://www.youtube.com/@GustavoElProfe" target="_blank" class="p-4 bg-slate-800 rounded-full hover:bg-purple-600 transition-colors pointer-events-auto border border-slate-700 hover:border-purple-500"><i data-lucide="youtube" class="w-6 h-6"></i></a>
                <a href="https://blog.gustavoelprofe.com" target="_blank" class="p-4 bg-slate-800 rounded-full hover:bg-purple-600 transition-colors pointer-events-auto border border-slate-700 hover:border-purple-500"><i data-lucide="notebook-pen" class="w-6 h-6"></i></a>
            </div>
        </div>

        <!-- Virtual Joystick Area -->
        <div id="joystick-zone"></div>
        
        <!-- Mobile Interaction Hint -->
        <div id="mobile-hint" class="absolute bottom-4 right-4 glass-panel px-4 py-2 rounded-lg text-sm md:hidden pointer-events-auto active:bg-slate-700 select-none z-50">
            Tap objects to view
        </div>
    </div>

    <!-- Custom JS Scripts -->
    <script src="script.js"></script>
</body>
</html>
